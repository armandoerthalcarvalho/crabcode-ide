<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="assets/crabcode_logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrabCode IDE</title>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="dark">

<!-- ========== HEADER ========== -->
<div id="header">
  <div class="logo"><img src="assets/crabcode_logo.png" alt="CrabCode" style="height:20px;vertical-align:middle;margin-right:5px;"><span>Crab</span>Code</div>
  <div class="tabs">
    <button class="tab active" data-tab="editor">Editor</button>
    <button class="tab" data-tab="tutorial">Tutorial</button>
    <button class="tab" data-tab="docs">Documentação</button>
    <button class="tab" data-tab="scripts">Scripts</button>
    <button class="tab" data-tab="libs">Bibliotecas</button>
    <button class="tab" data-tab="dados">Dados</button>
  </div>
  <div class="header-actions">
    <span class="saved-indicator" id="saved-indicator">Salvo ✓</span>
    <button class="btn btn-run" id="btn-run" title="Ctrl+Enter">▶ Rodar</button>
    <button class="btn btn-icon" id="btn-clear" title="Ctrl+L">🗑</button>
    <button class="btn-icon-sm" id="btn-export-png" title="Exportar código como PNG">📷</button>
    <button class="btn-icon-sm" id="btn-export-pdf" title="Exportar como PDF">📄</button>
    <button class="btn-icon-sm" id="btn-presentation" title="Modo Apresentação">🖥️</button>
    <button class="btn btn-icon" id="btn-theme" title="Alternar tema">🌙</button>
  </div>
</div>

<!-- ========== MAIN ========== -->
<div id="main">
  <!-- EDITOR PANEL -->
  <div id="editor-panel" class="active">
    <div class="editor-container">
      <div class="line-numbers" id="line-numbers">1</div>
      <div class="editor-wrapper">
        <div class="background-fill"></div>
        <div class="highlight-overlay" id="highlight-overlay"></div>
        <textarea id="code-editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
      </div>
    </div>
    <div id="error-panel">
      <div class="error-panel-header" id="error-toggle">
        <span>⚠️ Problemas</span>
        <span class="count zero" id="error-count">0</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text-muted)" id="error-toggle-arrow">▼</span>
      </div>
      <div class="error-list" id="error-list"></div>
    </div>
  </div>

  <!-- TUTORIAL PANEL -->
  <div id="tutorial-panel" class="doc-content">
    <!-- Filled by JS -->
  </div>

  <!-- DOCS PANEL -->
  <div id="docs-panel" class="doc-content">
    <!-- Filled by JS -->
  </div>

  <!-- SCRIPTS PANEL -->
  <div id="scripts-panel" class="doc-content" style="max-width:none;padding:0;">
    <div id="scripts-toolbar">
      <input id="scripts-search" type="text" placeholder="🔍 Pesquisar por título, descrição ou código..." autocomplete="off" />
      <button class="btn btn-run" id="btn-new-script">＋ Novo Script</button>
    </div>
    <div id="scripts-list"></div>
  </div>

  <!-- SCRIPT MODAL -->
  <div id="script-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 style="margin:0 0 16px;font-size:16px;color:var(--text-primary)">Novo Script</h2>
      <label class="modal-label">Título</label>
      <input id="modal-title" type="text" class="modal-input" placeholder="Ex: Dashboard de Vendas" maxlength="80" />
      <label class="modal-label">Descrição <span style="color:var(--text-muted);font-size:11px">(opcional)</span></label>
      <textarea id="modal-desc" class="modal-input modal-textarea" placeholder="Breve descrição do que esse script faz..." maxlength="300"></textarea>
      <label class="modal-label">Código</label>
      <textarea id="modal-code" class="modal-input modal-code" placeholder="Cole ou escreva o código CrabCode aqui..." spellcheck="false"></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" id="close-script-modal">Cancelar</button>
        <button class="btn btn-run" id="save-script-btn">Salvar Script</button>
      </div>
    </div>
  </div>

  <!-- LIBS PANEL -->
  <div id="libs-panel" class="doc-content" style="max-width:none;padding:0;">
    <div id="libs-toolbar">
      <input id="libs-search" type="text" placeholder="🔍 Pesquisar bibliotecas..." autocomplete="off" />
      <button class="btn" id="btn-scroll-meta" title="Ir para as meta-bibliotecas">🎙️ Ver Metas</button>
      <button class="btn btn-run" id="btn-new-lib">＋ Nova Biblioteca</button>
    </div>
    <div id="libs-list"></div>
  </div>

  <!-- LIB MODAL -->
  <div id="lib-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 style="margin:0 0 16px;font-size:16px;color:var(--text-primary)">Nova Biblioteca Personalizada</h2>
      <label class="modal-label">Chave de importação</label>
      <input id="lib-modal-key" type="text" class="modal-input" placeholder="Ex: minhas_funcoes (sem espaços)" maxlength="40" />
      <label class="modal-label">Título</label>
      <input id="lib-modal-title" type="text" class="modal-input" placeholder="Ex: 🛠️ Minhas Funções" maxlength="80" />
      <label class="modal-label">Descrição <span style="color:var(--text-muted);font-size:11px">(opcional)</span></label>
      <textarea id="lib-modal-desc" class="modal-input modal-textarea" placeholder="Breve descrição da biblioteca..." maxlength="300"></textarea>
      <label class="modal-label">Código CrabCode</label>
      <textarea id="lib-modal-code" class="modal-input modal-code" placeholder="defina dobrar como funcao(x) execute x * 2" spellcheck="false"></textarea>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" id="close-lib-modal">Cancelar</button>
        <button class="btn btn-run" id="save-lib-btn">Salvar Biblioteca</button>
      </div>
    </div>
  </div>

  <!-- DADOS (CSV) PANEL -->
  <div id="dados-panel" class="doc-content" style="max-width:none;padding:0;display:none;">
    <div id="dados-toolbar">
      <span style="font-size:13px;color:var(--text-secondary);">Cole um CSV abaixo, dê uma key e importe no editor com <code style="background:var(--bg-secondary);padding:1px 5px;border-radius:4px;">importe key</code></span>
      <button class="btn btn-run" id="btn-new-csv">＋ Novo CSV</button>
    </div>
    <div id="dados-list"></div>
  </div>

  <!-- CSV MODAL -->
  <div id="csv-modal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:560px;width:95%">
      <h2 style="margin:0 0 16px;font-size:16px;color:var(--text-primary)">📊 Novo Dataset CSV</h2>
      <label class="modal-label">Key de importação <span style="color:var(--text-muted);font-size:11px">(use no editor: importe key)</span></label>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <input id="csv-modal-key" type="text" class="modal-input" placeholder="Ex: vend" maxlength="20" style="margin:0;font-family:monospace;letter-spacing:1px;" />
        <button class="btn" id="csv-suggest-key" style="white-space:nowrap;flex-shrink:0">🎲 Sugerir</button>
      </div>
      <label class="modal-label">Título <span style="color:var(--text-muted);font-size:11px">(opcional)</span></label>
      <input id="csv-modal-title" type="text" class="modal-input" placeholder="Ex: Vendas 2024" maxlength="80" />
      <label class="modal-label">Cole o CSV aqui</label>
      <textarea id="csv-modal-content" class="modal-input modal-code" placeholder="mes,vendas,lucro&#10;jan,1200,340&#10;fev,980,210&#10;mar,1450,520" spellcheck="false" style="height:180px;font-size:12px;"></textarea>
      <div id="csv-modal-preview" style="margin-top:8px;font-size:11px;color:var(--text-muted);font-family:monospace;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" id="close-csv-modal">Cancelar</button>
        <button class="btn btn-run" id="save-csv-btn">Salvar Dataset</button>
      </div>
    </div>
  </div>

  <!-- RESIZE HANDLE -->
  <div id="resize-handle"></div>

  <!-- OUTPUT PANEL -->
  <div id="output-panel">
    <div class="output-header">
      <span class="title"><img src="assets/crabcode_logo.png" alt="CrabCode" style="height:14px;vertical-align:middle;margin-right:5px;">CrabCode Output</span>
      <button class="btn" id="btn-clear-output" style="padding:4px 8px;font-size:12px">Limpar</button>
    </div>
    <div class="output-body" id="output-body">
      <div class="output-empty">
        <div class="crab"><img src="assets/crabcode_logo.png" alt="CrabCode" style="width:48px;height:48px;"></div>
        <div>Pressione <strong>▶ Rodar</strong> ou <strong>Ctrl+Enter</strong></div>
        <div>para executar seu código CrabCode</div>
      </div>
    </div>
  </div>
</div>

<!-- AUTOCOMPLETE POPUP -->
<div id="autocomplete-popup" class="autocomplete-popup"></div>

<!-- PRESENTATION EXIT BUTTON -->
<button class="btn-presentation-exit" id="btn-presentation-exit">✕ Sair da Apresentação</button>

<script type="module" src="js/main.js"></script>
</body>
</html>
